<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEBULA-8 | Digital Learning Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04030F;
    --cyan: #00F5FF;
    --magenta: #FF2EF5;
    --amber: #FFBF00;
    --lime: #AAFF00;
    --white: #E8F0FF;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Exo 2', sans-serif;
    color: var(--white);
    cursor: none;
  }

  /* ── CUSTOM CURSOR ───────────────────────────────────── */
  #cursor {
    position: fixed; width: 14px; height: 14px;
    border-radius: 50%; background: var(--cyan);
    pointer-events: none; z-index: 9999;
    mix-blend-mode: screen;
    transform: translate(-50%, -50%);
    transition: width .2s, height .2s, opacity .2s;
    box-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan);
  }

  /* ── CANVAS (stars + shooting stars) ────────────────── */
  #starCanvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 0; display: block;
  }

  /* ── BACKGROUND NEBULA BLOBS ─────────────────────────── */
  .nebula {
    position: fixed; border-radius: 50%;
    filter: blur(90px); pointer-events: none; z-index: 1;
    animation: nebulaPulse 8s ease-in-out infinite alternate;
  }
  .n1 { width: 500px; height: 500px; background: rgba(0,120,180,.12); top: -10%; left: -10%; animation-delay: 0s; }
  .n2 { width: 420px; height: 420px; background: rgba(140,0,180,.10); top: 20%; right: -10%; animation-delay: 2s; }
  .n3 { width: 360px; height: 360px; background: rgba(255,80,0,.07); bottom: -5%; left: 30%; animation-delay: 4s; }
  @keyframes nebulaPulse { from { opacity: .6; transform: scale(1); } to { opacity: 1; transform: scale(1.12); } }

  /* ── MAIN SCENE ──────────────────────────────────────── */
  #scene {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    transition: transform 0.1s linear;
  }

  /* ── HEADER ──────────────────────────────────────────── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid rgba(0,245,255,.08);
    backdrop-filter: blur(12px);
    z-index: 200;
    animation: fadeDown .8s ease both;
  }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }

  .brand {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: 20px; letter-spacing: .18em;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .grade-tag {
    font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
    color: rgba(255,255,255,.28); font-family: 'Orbitron', monospace;
  }

  /* ── HERO TEXT ───────────────────────────────────────── */
  .hero-top {
    text-align: center; margin-bottom: 20px;
    animation: fadeUp 1s .3s ease both;
  }
  .hero-eyebrow {
    font-size: 10px; letter-spacing: .4em; text-transform: uppercase;
    color: rgba(0,245,255,.55); margin-bottom: 10px;
  }
  .hero-title {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(44px, 10vw, 88px); line-height: 1;
    letter-spacing: .05em;
    background: linear-gradient(135deg, #00F5FF 0%, #FF2EF5 45%, #FFBF00 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 1s .4s ease both, gradFlow 6s ease infinite;
  }
  @keyframes gradFlow { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

  /* ── ROCKET WRAPPER ──────────────────────────────────── */
  #rocket-wrap {
    position: relative; width: 200px; height: 320px;
    display: flex; align-items: center; justify-content: center;
    animation: hoverRocket 4s ease-in-out infinite, fadeUp 1.1s .5s ease both;
    transition: transform 0.1s linear;
    flex-shrink: 0;
  }
  @keyframes hoverRocket {
    0%,100% { transform: translateY(0px) rotate(-1deg); }
    50%      { transform: translateY(-18px) rotate(1deg); }
  }

  /* ── ROCKET SVG ──────────────────────────────────────── */
  .rocket-svg { width: 200px; height: 320px; filter: drop-shadow(0 0 30px rgba(0,245,255,.4)) drop-shadow(0 0 60px rgba(0,245,255,.2)); }

  /* ── FIRE EXHAUST ────────────────────────────────────── */
  .exhaust {
    position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
    width: 54px; display: flex; flex-direction: column; align-items: center; gap: 0;
  }
  .flame {
    border-radius: 50% 50% 40% 40%;
    animation: flicker var(--fd) ease-in-out infinite alternate;
    transform-origin: top center;
  }
  .flame-1 { width: 36px; height: 64px; background: linear-gradient(to bottom, #fff 0%, #FFEF00 25%, #FF9100 65%, transparent 100%); --fd: .09s; opacity: .95; }
  .flame-2 { width: 28px; height: 50px; background: linear-gradient(to bottom, #fff 0%, #FFCF00 30%, #FF5500 70%, transparent 100%); --fd: .13s; opacity: .8; margin-top: -38px; }
  .flame-3 { width: 18px; height: 72px; background: linear-gradient(to bottom, #fff 0%, #00F5FF 30%, #0080FF 60%, transparent 100%); --fd: .07s; opacity: .65; margin-top: -50px; }
  @keyframes flicker {
    0%   { transform: scaleX(1) scaleY(1) skewX(0deg); opacity: .9; }
    33%  { transform: scaleX(.85) scaleY(1.08) skewX(-3deg); opacity: 1; }
    66%  { transform: scaleX(1.1) scaleY(.94) skewX(2deg); opacity: .75; }
    100% { transform: scaleX(.92) scaleY(1.12) skewX(1deg); opacity: .95; }
  }

  /* ── SMOKE PARTICLES ─────────────────────────────────── */
  .smoke-container {
    position: absolute; bottom: -40px; left: 50%;
    width: 0; height: 0; pointer-events: none;
  }
  .smoke {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(160,180,220,.35) 0%, transparent 70%);
    animation: smokeAnim var(--sd) ease-out infinite;
    animation-delay: var(--sdelay);
  }
  @keyframes smokeAnim {
    0%   { transform: translate(var(--sx), 0) scale(.3); opacity: .6; }
    60%  { opacity: .3; }
    100% { transform: translate(calc(var(--sx) * 1.8), 120px) scale(2.5); opacity: 0; }
  }

  /* ── CTA BUTTON ──────────────────────────────────────── */
  .cta-wrap {
    margin-top: 28px;
    animation: fadeUp 1s .8s ease both;
    position: relative; z-index: 20;
  }
  #startBtn {
    position: relative; cursor: none;
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 13px; letter-spacing: .28em; text-transform: uppercase;
    color: #04030F;
    padding: 18px 48px;
    border: none; border-radius: 4px;
    background: linear-gradient(135deg, var(--cyan), #0090ff);
    box-shadow: 0 0 24px rgba(0,245,255,.5), 0 0 60px rgba(0,245,255,.25), inset 0 1px 0 rgba(255,255,255,.3);
    transition: transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s;
    overflow: hidden;
  }
  #startBtn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.25) 60%, transparent 80%);
    transform: translateX(-100%) skewX(-20deg);
    transition: transform .5s;
  }
  #startBtn:hover { transform: scale(1.06); box-shadow: 0 0 40px rgba(0,245,255,.7), 0 0 80px rgba(0,245,255,.35), inset 0 1px 0 rgba(255,255,255,.4); }
  #startBtn:hover::before { transform: translateX(200%) skewX(-20deg); }
  #startBtn:active { transform: scale(.97); }

  .btn-ring {
    position: absolute; inset: -4px; border-radius: 6px;
    border: 1px solid rgba(0,245,255,.4);
    animation: btnRingPulse 2s ease-in-out infinite;
  }
  .btn-ring2 { inset: -9px; border-radius: 8px; border-color: rgba(0,245,255,.2); animation-delay: .4s; }
  @keyframes btnRingPulse { 0%,100% { opacity: .8; transform: scale(1); } 50% { opacity: .2; transform: scale(1.04); } }

  /* ── HERO SUBTITLE ───────────────────────────────────── */
  .hero-sub {
    text-align: center; margin-top: 26px;
    font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
    color: rgba(160,185,255,.4);
    animation: fadeUp 1s 1s ease both;
  }

  /* ── SUBJECT ORBIT DOTS ──────────────────────────────── */
  .orbit-ring {
    position: fixed; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.04);
    pointer-events: none; z-index: 5;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    animation: spinOrbit var(--od) linear infinite;
  }
  @keyframes spinOrbit { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }

  .orbit-dot {
    position: absolute; border-radius: 50%;
    top: 0; left: 50%; transform: translate(-50%, -50%);
    box-shadow: 0 0 8px var(--dc), 0 0 16px var(--dc);
  }
  .orbit-label {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    font-family: 'Orbitron', monospace; font-size: 7px; letter-spacing: .15em;
    color: var(--dc); white-space: nowrap; opacity: .8;
  }

  /* ── ZOOM TRANSITION OVERLAY ─────────────────────────── */
  #zoomOverlay {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0;
    background: radial-gradient(circle at center, rgba(0,245,255,.9) 0%, rgba(4,3,15,1) 70%);
  }
  #zoomOverlay.active {
    animation: zoomIn .9s cubic-bezier(.22,1,.36,1) forwards;
    pointer-events: all;
  }
  @keyframes zoomIn {
    0%   { opacity: 0; transform: scale(0.04); }
    40%  { opacity: 1; transform: scale(1); }
    70%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(8); }
  }
  .zoom-text {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(32px, 8vw, 72px); letter-spacing: .2em;
    color: #04030F; text-align: center;
    opacity: 0; transition: opacity .2s .3s;
  }
  #zoomOverlay.active .zoom-text { opacity: 1; }

  /* ── SCANLINE OVERLAY ────────────────────────────────── */
  .scanlines {
    position: fixed; inset: 0; z-index: 400; pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px);
  }

  /* ── GRID LINES ──────────────────────────────────────── */
  .grid-lines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,245,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ── CORNER DECORATIONS ──────────────────────────────── */
  .corner {
    position: fixed; width: 60px; height: 60px;
    border-color: rgba(0,245,255,.3); border-style: solid;
    z-index: 100; pointer-events: none;
  }
  .corner-tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  /* ── STATUS INDICATORS ───────────────────────────────── */
  .status-bar {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 24px; align-items: center; z-index: 100;
    animation: fadeUp .8s 1.4s ease both;
  }
  .status-dot {
    display: flex; align-items: center; gap: 7px;
    font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
    color: rgba(255,255,255,.3); font-family: 'Orbitron', monospace;
  }
  .dot-pip {
    width: 6px; height: 6px; border-radius: 50%;
    animation: pipBlink 2s ease-in-out infinite;
  }
  @keyframes pipBlink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

  /* ── DIAGONAL ACCENT LINE ─────────────────────────────── */
  .diag-line {
    position: fixed; z-index: 3; pointer-events: none;
    width: 2px; height: 200px;
    background: linear-gradient(to bottom, transparent, rgba(0,245,255,.12), transparent);
    transform-origin: top center;
  }
  .dl1 { top: 30%; left: 15%; transform: rotate(30deg); }
  .dl2 { top: 10%; right: 20%; transform: rotate(-25deg); }
  .dl3 { bottom: 20%; right: 10%; transform: rotate(15deg); }

  /* ── AUDIO TOGGLE BUTTON ─────────────────────────────── */
  #audioBtn {
    position: fixed;
    top: 50%;
    right: 28px;
    transform: translateY(-50%);
    z-index: 300;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(0,245,255,.35);
    background: rgba(4,3,15,.75);
    backdrop-filter: blur(12px);
    cursor: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .3s, box-shadow .3s, transform .2s;
    box-shadow: 0 0 16px rgba(0,245,255,.15), inset 0 0 12px rgba(0,245,255,.04);
    animation: fadeDown .8s 1.6s ease both;
  }
  #audioBtn:hover {
    border-color: rgba(0,245,255,.8);
    box-shadow: 0 0 28px rgba(0,245,255,.45), inset 0 0 16px rgba(0,245,255,.1);
    transform: translateY(-50%) scale(1.1);
  }
  #audioBtn:active { transform: translateY(-50%) scale(.94); }

  /* Waveform bars — shown when playing */
  .wave-bars {
    display: flex;
    align-items: center;
    gap: 2.5px;
    height: 18px;
  }
  .wave-bars span {
    display: block;
    width: 3px;
    background: var(--cyan);
    border-radius: 2px;
    box-shadow: 0 0 6px var(--cyan);
    animation: barBounce var(--bd) ease-in-out infinite alternate;
    transform-origin: bottom;
  }
  .wave-bars span:nth-child(1) { height: 8px;  --bd: .35s; }
  .wave-bars span:nth-child(2) { height: 16px; --bd: .28s; animation-delay: .06s; }
  .wave-bars span:nth-child(3) { height: 11px; --bd: .42s; animation-delay: .12s; }
  .wave-bars span:nth-child(4) { height: 16px; --bd: .31s; animation-delay: .04s; }
  .wave-bars span:nth-child(5) { height: 7px;  --bd: .38s; animation-delay: .09s; }
  @keyframes barBounce {
    from { transform: scaleY(1); }
    to   { transform: scaleY(.25); }
  }

  /* Muted icon — shown when muted */
  .mute-icon {
    display: none;
    width: 18px; height: 18px;
    position: relative;
  }
  .mute-icon svg { width: 18px; height: 18px; }

  /* State toggling */
  #audioBtn.muted .wave-bars { display: none; }
  #audioBtn.muted .mute-icon { display: flex; align-items: center; justify-content: center; }

  /* Pulse ring when playing */
  #audioBtn::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(0,245,255,.2);
    animation: audioRingPulse 2.4s ease-in-out infinite;
  }
  #audioBtn.muted::before { animation: none; opacity: 0; }
  @keyframes audioRingPulse {
    0%,100% { transform: scale(1);    opacity: .7; }
    50%      { transform: scale(1.18); opacity: 0; }
  }

  /* Tooltip label */
  #audioBtn::after {
    content: attr(data-tip);
    position: absolute;
    right: calc(100% + 12px);
    top: 50%; transform: translateY(-50%);
    font-family: 'Orbitron', monospace;
    font-size: 8px; letter-spacing: .18em;
    color: rgba(0,245,255,.6);
    white-space: nowrap;
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  #audioBtn:hover::after { opacity: 1; }
</style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor"></div>

<!-- Scanlines & grid -->
<div class="scanlines"></div>
<div class="grid-lines"></div>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Diagonal accent lines -->
<div class="diag-line dl1"></div>
<div class="diag-line dl2"></div>
<div class="diag-line dl3"></div>

<!-- Nebula blobs -->
<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>

<!-- Star canvas -->
<canvas id="starCanvas"></canvas>

<!-- Orbit rings with subject dots -->
<div class="orbit-ring" style="width:480px;height:480px;--od:28s;">
  <div class="orbit-dot" style="width:10px;height:10px;background:var(--cyan);--dc:var(--cyan);left:0%;top:0%;">
    <span class="orbit-label">MATH</span>
  </div>
</div>
<div class="orbit-ring" style="width:620px;height:620px;--od:42s;animation-direction:reverse;">
  <div class="orbit-dot" style="width:8px;height:8px;background:var(--lime);--dc:var(--lime);left:50%;top:100%;">
    <span class="orbit-label">SCIENCE</span>
  </div>
</div>
<div class="orbit-ring" style="width:760px;height:760px;--od:58s;">
  <div class="orbit-dot" style="width:8px;height:8px;background:var(--magenta);--dc:var(--magenta);left:100%;top:50%;">
    <span class="orbit-label">ENGLISH</span>
  </div>
</div>
<div class="orbit-ring" style="width:900px;height:900px;--od:72s;animation-direction:reverse;">
  <div class="orbit-dot" style="width:9px;height:9px;background:var(--amber);--dc:var(--amber);left:25%;top:0%;">
    <span class="orbit-label">SOC. SCI</span>
  </div>
</div>

<!-- Main scene -->
<div id="scene">
  <!-- Header -->
  <header>
    <span class="brand">NEBULA-8</span>
    <span class="grade-tag">Grade 8 · 2025–26</span>
  </header>

  <!-- Hero title -->
  <div class="hero-top">
    <p class="hero-eyebrow">Digital Learning Universe</p>
    <h1 class="hero-title">NEBULA-8</h1>
  </div>

  <!-- Rocket -->
  <div id="rocket-wrap">
    <!-- SVG Rocket -->
    <svg class="rocket-svg" viewBox="0 0 200 340" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#061828"/>
          <stop offset="30%"  stop-color="#0d3a5c"/>
          <stop offset="55%"  stop-color="#1a5a8a"/>
          <stop offset="80%"  stop-color="#0a2e4a"/>
          <stop offset="100%" stop-color="#040e1a"/>
        </linearGradient>
        <linearGradient id="noseGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#003d55"/>
          <stop offset="45%"  stop-color="#00b8d4"/>
          <stop offset="100%" stop-color="#002535"/>
        </linearGradient>
        <linearGradient id="wingL" x1="1" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#0c2d48"/>
          <stop offset="100%" stop-color="#020a12"/>
        </linearGradient>
        <linearGradient id="wingR" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#0c2d48"/>
          <stop offset="100%" stop-color="#020a12"/>
        </linearGradient>
        <linearGradient id="bellGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#1a4f7a"/>
          <stop offset="100%" stop-color="#030d18"/>
        </linearGradient>
        <radialGradient id="thrusterGrad" cx="50%" cy="30%" r="60%">
          <stop offset="0%"   stop-color="#00F5FF" stop-opacity=".5"/>
          <stop offset="100%" stop-color="#020a14" stop-opacity="1"/>
        </radialGradient>
        <radialGradient id="windowGrad" cx="38%" cy="35%" r="55%">
          <stop offset="0%"   stop-color="#80ffff" stop-opacity=".9"/>
          <stop offset="45%"  stop-color="#0077cc" stop-opacity=".8"/>
          <stop offset="100%" stop-color="#001020" stop-opacity="1"/>
        </radialGradient>
        <linearGradient id="stripeGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#00F5FF" stop-opacity="0"/>
          <stop offset="20%"  stop-color="#00F5FF" stop-opacity=".7"/>
          <stop offset="80%"  stop-color="#00F5FF" stop-opacity=".5"/>
          <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="stripeM" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#FF2EF5" stop-opacity="0"/>
          <stop offset="30%"  stop-color="#FF2EF5" stop-opacity=".5"/>
          <stop offset="70%"  stop-color="#FF2EF5" stop-opacity=".3"/>
          <stop offset="100%" stop-color="#FF2EF5" stop-opacity="0"/>
        </linearGradient>
        <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="3.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <path d="M88 168 C80 185, 42 220, 22 282 L62 268 C68 250, 80 215, 88 200 Z"
            fill="url(#wingL)" stroke="#0d4878" stroke-width=".8"/>

<!-- Status bar -->
<div class="status-bar">

<!-- Audio mute/unmute button (right side, vertically centred) -->
<button id="audioBtn" data-tip="AUDIO" aria-label="Toggle background music">
  <!-- Animated waveform bars (playing state) -->

</audio>

<!-- Zoom transition overlay -->

  <div class="zoom-text">LAUNCHING...</div>

<script>
/* ── CURSOR ─────────────────────────────────────────────── */
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

/* ── CANVAS STARS + SHOOTING STARS ──────────────────────── */
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let W, H, stars = [], shooters = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 280; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.8 + .2,
    baseOpacity: Math.random() * .7 + .2,
    twinkleSpeed: .5 + Math.random() * 1.5,
    twinkleOffset: Math.random() * Math.PI * 2,
    color: ['#ffffff','#cce8ff','#ffe8cc','#e8ccff'][Math.floor(Math.random()*4)],
    parallaxStrength: Math.random() * .6 + .1,
    ox: 0, oy: 0
  });
}

function spawnShooter() {
  const angle = -(20 + Math.random() * 30) * Math.PI / 180;
  const speed = 6 + Math.random() * 8;
  shooters.push({
    x: Math.random() * W * .7,
    y: Math.random() * H * .3,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    len: 80 + Math.random() * 120,
    opacity: 1,
    width: .5 + Math.random() * 1.2
  });
}
setInterval(() => { if (Math.random() < .6) spawnShooter(); }, 1200);

let t = 0, parallaxX = 0, parallaxY = 0;

function drawFrame() {
  ctx.clearRect(0, 0, W, H);
  t += .016;

  stars.forEach(s => {
    const twinkle = s.baseOpacity * (.6 + .4 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
    const px = s.x * W + parallaxX * s.parallaxStrength;
    const py = s.y * H + parallaxY * s.parallaxStrength;
    ctx.beginPath();
    ctx.arc(((px % W) + W) % W, ((py % H) + H) % H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.globalAlpha = twinkle;
    ctx.fill();
  });

  shooters = shooters.filter(s => s.opacity > 0);
  shooters.forEach(s => {
    const grad = ctx.createLinearGradient(s.x, s.y, s.x - s.vx * (s.len / 8), s.y - s.vy * (s.len / 8));
    grad.addColorStop(0, `rgba(255,255,255,${s.opacity})`);
    grad.addColorStop(.3, `rgba(180,220,255,${s.opacity * .6})`);
    grad.addColorStop(1, 'rgba(180,220,255,0)');
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.vx * (s.len / 8), s.y - s.vy * (s.len / 8));
    ctx.strokeStyle = grad;
    ctx.lineWidth = s.width;
    ctx.globalAlpha = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.width * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.opacity * .9})`;
    ctx.globalAlpha = 1;
    ctx.fill();
    s.x += s.vx; s.y += s.vy;
    s.opacity -= .018;
  });

  ctx.globalAlpha = 1;
  requestAnimationFrame(drawFrame);
}
drawFrame();

/* ── SMOKE PARTICLES ─────────────────────────────────────── */
const smokeContainer = document.getElementById('smokeContainer');
function makeSmoke() {
  const el = document.createElement('div');
  el.className = 'smoke';
  const size = 20 + Math.random() * 30;
  const sx = (Math.random() - .5) * 30;
  el.style.cssText = `width:${size}px;height:${size}px;left:${sx}px;bottom:0;--sx:${sx}px;--sd:${1.2 + Math.random() * .8}s;--sdelay:${Math.random() * .4}s;margin-left:${-size/2}px;`;
  smokeContainer.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}
setInterval(makeSmoke, 120);

/* ── PARALLAX ────────────────────────────────────────────── */
const scene      = document.getElementById('scene');
const rocketWrap = document.getElementById('rocket-wrap');
let tiltX = 0, tiltY = 0, curX = 0, curY = 0, mouseX = 0, mouseY = 0;

document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth  - .5) * 2;
  mouseY = (e.clientY / window.innerHeight - .5) * 2;
});

function handleOrientation(e) {
  if (e.gamma === null) return;
  tiltX = Math.max(-1, Math.min(1, e.gamma / 25));
  tiltY = Math.max(-1, Math.min(1, (e.beta - 30) / 25));
}
window.addEventListener('deviceorientation', handleOrientation);

if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
  document.getElementById('startBtn').addEventListener('click', () => {
    DeviceOrientationEvent.requestPermission().then(p => {
      if (p === 'granted') window.addEventListener('deviceorientation', handleOrientation);
    }).catch(console.error);
  }, { once: true });
}

function lerp(a, b, t) { return a + (b - a) * t; }

function updateParallax() {
  const ax = tiltX !== 0 ? tiltX : mouseX;
  const ay = tiltY !== 0 ? tiltY : mouseY;
  curX = lerp(curX, ax, .06);
  curY = lerp(curY, ay, .06);
  scene.style.transform      = `translate(${curX * 14}px, ${curY * 10}px)`;
  rocketWrap.style.transform = `translate(${curX * 22}px, ${curY * 16}px)`;
  parallaxX = curX * 60;
  parallaxY = curY * 40;
  requestAnimationFrame(updateParallax);
}
updateParallax();

/* ── BACKGROUND AUDIO ────────────────────────────────────── */
const bgAudio  = document.getElementById('bgAudio');
const audioBtn = document.getElementById('audioBtn');
let audioStarted = false;
let isMuted = false;

bgAudio.volume = 0.35; // comfortable background level

// Attempt autoplay; browsers may block it until a user gesture
function tryAutoplay() {
  bgAudio.play().then(() => {
    audioStarted = true;
  }).catch(() => {
    // Autoplay blocked — will start on first user interaction
    audioStarted = false;
  });
}
tryAutoplay();

// Start audio on first interaction anywhere (fallback for autoplay block)
function startOnInteraction() {
  if (!audioStarted && !isMuted) {
    bgAudio.play().then(() => { audioStarted = true; }).catch(() => {});
  }
  document.removeEventListener('pointerdown', startOnInteraction);
  document.removeEventListener('keydown', startOnInteraction);
}
document.addEventListener('pointerdown', startOnInteraction);
document.addEventListener('keydown',     startOnInteraction);

// Mute / unmute toggle
audioBtn.addEventListener('click', () => {
  isMuted = !isMuted;

  if (isMuted) {
    bgAudio.pause();
    audioBtn.classList.add('muted');
    audioBtn.setAttribute('data-tip', 'MUTED');
  } else {
    bgAudio.play().then(() => { audioStarted = true; }).catch(() => {});
    audioBtn.classList.remove('muted');
    audioBtn.setAttribute('data-tip', 'AUDIO');
  }
});

/* ── START BUTTON → ZOOM TRANSITION → DASHBOARD ─────────── */
const overlay = document.getElementById('zoomOverlay');
document.getElementById('startBtn').addEventListener('click', () => {
  overlay.classList.add('active');
  setTimeout(() => {
    window.location.href = 'nebula8-dashboard.html';
  }, 1200);
});
</script>
