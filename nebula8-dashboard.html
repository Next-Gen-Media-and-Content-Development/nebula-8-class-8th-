#main { display:flex; gap:10px; flex:1; min-height:0; }

.subj-tab.active { border-color:var(--tc); background:rgba(6,14,36,.8); box-shadow:0 0 0 1px rgba(0,0,0,.3); }

#subject-header { padding:14px 20px; border-radius:10px; border:1px solid rgba(255,255,255,.06); background:rgba(6,12,34,.6); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }

.ch-arrow { width:18px; height:18px; border-radius:5px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; }
.ch-arrow svg { width:8px; height:8px; stroke:var(--cc,#00f5ff); fill:none; stroke-width:2.5; }
.ch9-btn { display:inline-block; background:rgba(170,255,0,.15); color:#AAFF00; border:1px solid rgba(170,255,0,.4); border-radius:6px; padding:3px 9px; font-size:8px; font-family:'Orbitron',monospace; font-weight:700; letter-spacing:.08em; text-decoration:none; }

/* Stars canvas */
#starCanvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }
#app { z-index:10; }

  document.getElementById('subjectIcon').textContent = s.icon;

  document.getElementById('subjectIcon').style.border = '1px solid ' + c.acDim;

  // Build chapter cards
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';

  s.data.forEach(function(ch) {
    const card = document.createElement('div');
    card.className = 'ch-card' + (ch.locked ? ' locked' : '') + (ch._sl ? ' ch9' : '');
    card.style.setProperty('--cc', c.color);

    var footerRight = ch._sl
      ? '<a href="solution-lab-ch9.html" target="_blank" class="ch9-btn">⚗️ Open Lab</a>'
      : '<div class="ch-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>';

    card.innerHTML =
      '<div class="card-bar"></div>' +
      (ch.locked ? '<div class="lock-badge">🔒</div>' : '') +
      '<div class="ch-num">' + ch.num + '</div>' +
      '<div class="ch-title">' + ch.title + '</div>' +
      '<div class="ch-desc">' + ch.desc + '</div>' +
      '<div class="card-footer"><span class="ch-type">' + ch.type + '</span>' + footerRight + '</div>';

    grid.appendChild(card);
  });
}

// Sidebar tab switching
document.querySelectorAll('.subj-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.subj-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    activeSubject = tab.dataset.subject;
    renderSubject(activeSubject);
  });
});

renderSubject('math');

// Star canvas
(function() {
  var canvas = document.getElementById('starCanvas');
  var ctx = canvas.getContext('2d');
  var W, H, stars = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (var i = 0; i < 200; i++) {
    stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.4 + .3,
      op: Math.random() * .5 + .1, sp: .3 + Math.random() * 1.5, ph: Math.random() * 6.28 });
  }
  var t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H); t += .016;
    stars.forEach(function(s) {
      ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, 6.28);
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = s.op * (.5 + .5 * Math.sin(t * s.sp + s.ph));
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();

// Clock
(function() {
  function tick() {
    var now = new Date();
    var el = document.getElementById('clockDisplay');
    if (el) el.textContent = 'UTC ' + now.toUTCString().slice(17, 25);
  }
  tick(); setInterval(tick, 1000);
})();
</script>
